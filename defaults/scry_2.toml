# Scry2 default configuration.
#
# This file is shipped with the repo and documents every configurable key.
# It is NEVER loaded at runtime — it exists purely as a template and reference.
#
# To override, create ~/.config/scry_2/config.toml with the keys you want to
# change. Any keys you omit will fall back to the built-in defaults baked
# into Scry2.Config.

# ── Database ─────────────────────────────────────────────────────────────
[database]
# SQLite database path. Parent directory will be created if it doesn't exist.
# Platform defaults (auto-detected at runtime):
#   Linux:   ~/.local/share/scry_2/scry_2.db
#   macOS:   ~/Library/Application Support/scry_2/scry_2.db
#   Windows: %APPDATA%\scry_2\scry_2.db
path = "~/.local/share/scry_2/scry_2.db"

# ── MTGA log watcher ─────────────────────────────────────────────────────
[mtga_logs]
# Absolute path to MTGA's Player.log. If unset, Scry2 tries well-known
# locations in order and uses the first match. Uncomment to override.
# Well-known locations checked per platform:
#   Linux:   Steam (Flatpak + native), Lutris, Bottles
#   macOS:   ~/Library/Logs/Wizards Of The Coast/MTGA/Player.log
#   Windows: ~/AppData/LocalLow/Wizards Of The Coast/MTGA/Player.log
# player_log_path = "/home/you/.var/app/com.valvesoftware.Steam/.local/share/Steam/steamapps/compatdata/2141910/pfx/drive_c/users/steamuser/AppData/LocalLow/Wizards Of The Coast/MTGA/Player.log"

# Path to MTGA's data directory containing Raw_CardDatabase_*.mtga.
# If unset, Scry2 derives it from the MTGA installation path.
# data_dir = "/home/you/.local/share/Steam/steamapps/common/MTGA/MTGA_Data/Downloads/Raw"

# How often (ms) the tailer polls after a filesystem event, to catch
# buffered writes. The watcher is event-driven (inotify) — this is a
# debounce/flush interval, not a polling loop.
poll_interval_ms = 500

# Note: there is no `self_user_id` config key. The pipeline auto-detects
# your MTGA Wizards user id from the first `AuthenticateResponse` event
# in Player.log and persists it in the `ingestion_state` table for all
# future runs. On a fresh install, before the first authenticate event
# arrives, the translator falls back to assuming `systemSeatId: 1` is
# you — which is correct for the overwhelming majority of matches.

# ── Card reference data ──────────────────────────────────────────────────
[cards]
# Cron expression for the daily card synthesis job (Oban.Plugins.Cron
# syntax). Synthesis builds `cards_cards` from `cards_mtga_cards` (your
# local MTGA install) + `cards_scryfall_cards` (Scryfall bulk).
# Default: daily at 05:30 UTC, after the upstream MTGA + Scryfall imports.
refresh_cron = "30 5 * * *"

# Scryfall bulk-data catalog endpoint. The actual download URL rotates;
# this endpoint returns JSON with a `download_uri` field.
scryfall_bulk_url = "https://api.scryfall.com/bulk-data/default-cards"

# ── Cache ─────────────────────────────────────────────────────────────────
[cache]
# Parent directory for all cached application data. Sub-directories are
# created automatically. Defaults to a platform-appropriate location:
#   Linux:   ~/.local/share/scry_2/cache/
#   macOS:   ~/Library/Application Support/scry_2/cache/
#   Windows: %APPDATA%\scry_2\cache\
# dir = "~/.local/share/scry_2/cache/"

# ── Card images ──────────────────────────────────────────────────────────
[images]
# Directory to cache downloaded card images locally. Defaults to
# <cache.dir>/images/ when unset. Scryfall card art is fetched on first
# access and stored here permanently. The directory can be deleted —
# images re-download on demand.
# cache_dir = "~/.local/share/scry_2/images/"

# ── Workers ──────────────────────────────────────────────────────────────
# These toggles let a dev server and a production release coexist on one
# machine without double-processing events. Set either to `false` to skip
# the corresponding supervision child.
[workers]
start_watcher = true
start_importer = true

# ── Server ────────────────────────────────────────────────────────────────
[server]
# HTTP port the web UI listens on. Change this if running a production
# release alongside a dev server on the same machine (dev uses 4444 by
# default, so they do not conflict).
port = 6015
