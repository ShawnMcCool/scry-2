name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ubuntu-latest-mix-${{ env.MIX_ENV }}-1.19-28-${{ hashFiles('**/mix.lock') }}
          restore-keys: ubuntu-latest-mix-${{ env.MIX_ENV }}-1.19-28-

      - name: Install system dependencies
        run: sudo apt-get install -y inotify-tools

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: tar.gz
          - os: macos-latest
            platform: macos-aarch64
            ext: tar.gz
          - os: windows-latest
            platform: windows-x86_64
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: python
        run: |
          import re, os
          tag = os.environ.get('GITHUB_REF_NAME', '')
          version = tag.lstrip('v') if tag.startswith('v') else tag
          if not re.match(r'^\d+\.\d+\.\d+', version):
              raise ValueError(f"Tag '{tag}' does not produce a valid semver: '{version}'")
          with open('mix.exs') as f:
              content = f.read()
          updated = re.sub(r'version: "[^"]+"', f'version: "{version}"', content)
          with open('mix.exs', 'w') as f:
              f.write(updated)
          print(f"Set version to {version}")

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'

      - name: Cache Mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-1.19-28-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-1.19-28-

      - name: Install dependencies
        run: mix deps.get --only prod
        env:
          MIX_ENV: prod

      - name: Compile
        run: mix compile
        env:
          MIX_ENV: prod
          MIX_OS_DEPS_COMPILE_PARTITION_COUNT: "8"

      - name: Deploy assets
        run: mix assets.deploy
        env:
          MIX_ENV: prod

      - name: Build release
        run: mix release
        env:
          MIX_ENV: prod
          MIX_OS_DEPS_COMPILE_PARTITION_COUNT: "8"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tray/go.sum

      - name: Install tray system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev

      - name: Build tray binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: cd tray && go build -ldflags="-X 'scry2/tray/updater.CurrentVersion=${{ github.ref_name }}'" -o ../scry2-tray .

      - name: Build tray binary (Windows — zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: cd tray && go build -ldflags="-H windowsgui -X 'scry2/tray/updater.CurrentVersion=${{ github.ref_name }}'" -o ../scry2-tray.exe .

      - name: Build tray binary (Windows — MSI)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: cd tray && go build -ldflags="-H windowsgui -X 'scry2/tray/updater.CurrentVersion=${{ github.ref_name }}' -X 'scry2/tray/updater.InstallerType=msi'" -o ../scry2-tray-msi.exe .

      - name: Package release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ARCHIVE="scry_2-${{ github.ref_name }}-${{ matrix.platform }}"
          mkdir "$ARCHIVE"
          cp -r _build/prod/rel/scry_2/. "$ARCHIVE/"
          cp scry2-tray "$ARCHIVE/scry2-tray"
          rm -f "$ARCHIVE/install.bat" "$ARCHIVE/uninstall.bat"
          cp scripts/install-linux "$ARCHIVE/install"
          cp scripts/uninstall-linux "$ARCHIVE/uninstall"
          printf "Run ./install to set up Scry2.\nSee https://github.com/${{ github.repository }} for full instructions.\n" > "$ARCHIVE/README.txt"
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"

      - name: Package release (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ARCHIVE="scry_2-${{ github.ref_name }}-${{ matrix.platform }}"
          mkdir "$ARCHIVE"
          cp -r _build/prod/rel/scry_2/. "$ARCHIVE/"
          cp scry2-tray "$ARCHIVE/scry2-tray"
          rm -f "$ARCHIVE/install.bat" "$ARCHIVE/uninstall.bat"
          cp scripts/install-macos "$ARCHIVE/install"
          cp scripts/uninstall-macos "$ARCHIVE/uninstall"
          printf "Run ./install to set up Scry2.\nSee https://github.com/${{ github.repository }} for full instructions.\n" > "$ARCHIVE/README.txt"
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"

      - name: Package release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ARCHIVE = "scry_2-${{ github.ref_name }}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Name $ARCHIVE
          Copy-Item -Recurse "_build\prod\rel\scry_2\*" "$ARCHIVE\"
          Copy-Item "scry2-tray.exe" "$ARCHIVE\scry2-tray.exe"
          "Run install.bat to set up Scry2.`nSee https://github.com/${{ github.repository }} for full instructions." | Out-File "$ARCHIVE\README.txt" -Encoding UTF8
          Compress-Archive -Path "$ARCHIVE" -DestinationPath "${ARCHIVE}.zip"

      # --- MSI Installer (Windows only) ---

      - name: Install .NET SDK
        if: matrix.os == 'windows-latest'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX v5
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add WixToolset.UI.wixext/5.0.2
          wix extension add WixToolset.Util.wixext/5.0.2
          wix extension add WixToolset.Firewall.wixext/5.0.2
          wix extension add WixToolset.Bal.wixext/5.0.2

      - name: Download VC++ Redistributable
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "installer/vc_redist.x64.exe"

      - name: Build MSI installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          installer/scripts/build-msi.ps1 `
            -Version $version `
            -TrayExe scry2-tray-msi.exe `
            -VCRedistPath installer/vc_redist.x64.exe

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          files: scry_2-${{ github.ref_name }}-${{ matrix.platform }}.${{ matrix.ext }}
          generate_release_notes: true

      - name: Upload MSI installer
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/Scry2Setup-${{ github.ref_name }}.exe
