name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ubuntu-latest-mix-${{ env.MIX_ENV }}-1.18-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: ubuntu-latest-mix-${{ env.MIX_ENV }}-1.18-27-

      - name: Install system dependencies
        run: sudo apt-get install -y inotify-tools

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: tar.gz
          - os: macos-latest
            platform: macos-aarch64
            ext: tar.gz
          - os: windows-latest
            platform: windows-x86_64
            ext: zip
            # CLOCK_MONOTONIC_RAW is Linux-only; alias it for MinGW
            cflags: "-DCLOCK_MONOTONIC_RAW=CLOCK_MONOTONIC"

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: python
        run: |
          import re, os
          tag = os.environ.get('GITHUB_REF_NAME', '')
          version = tag.lstrip('v') if tag.startswith('v') else tag
          if not re.match(r'^\d+\.\d+\.\d+', version):
              raise ValueError(f"Tag '{tag}' does not produce a valid semver: '{version}'")
          with open('mix.exs') as f:
              content = f.read()
          updated = re.sub(r'version: "[^"]+"', f'version: "{version}"', content)
          with open('mix.exs', 'w') as f:
              f.write(updated)
          print(f"Set version to {version}")

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'

      - name: Cache Mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-1.18-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-1.18-27-

      - name: Install make (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install make --no-progress -y

      - name: Install dependencies
        run: mix deps.get --only prod
        env:
          MIX_ENV: prod

      - name: Compile
        run: mix compile
        env:
          MIX_ENV: prod
          MIX_OS_DEPS_COMPILE_PARTITION_COUNT: "8"
          CFLAGS: ${{ matrix.cflags }}

      - name: Deploy assets
        run: mix assets.deploy
        env:
          MIX_ENV: prod

      - name: Build release
        run: mix release
        env:
          MIX_ENV: prod
          MIX_OS_DEPS_COMPILE_PARTITION_COUNT: "8"

      - name: Package release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ARCHIVE="scry_2-${{ github.ref_name }}-${{ matrix.platform }}"
          mkdir "$ARCHIVE"
          cp -r _build/prod/rel/scry_2/. "$ARCHIVE/"
          rm -f "$ARCHIVE/install.bat" "$ARCHIVE/uninstall.bat"
          cp scripts/install "$ARCHIVE/install"
          cp scripts/uninstall "$ARCHIVE/uninstall"
          printf "Run ./install to set up Scry2.\nSee https://github.com/${{ github.repository }} for full instructions.\n" > "$ARCHIVE/README.txt"
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"

      - name: Package release (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ARCHIVE="scry_2-${{ github.ref_name }}-${{ matrix.platform }}"
          mkdir "$ARCHIVE"
          cp -r _build/prod/rel/scry_2/. "$ARCHIVE/"
          rm -f "$ARCHIVE/install.bat" "$ARCHIVE/uninstall.bat"
          cp scripts/install-macos "$ARCHIVE/install"
          cp scripts/uninstall-macos "$ARCHIVE/uninstall"
          printf "Run ./install to set up Scry2.\nSee https://github.com/${{ github.repository }} for full instructions.\n" > "$ARCHIVE/README.txt"
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"

      - name: Package release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ARCHIVE = "scry_2-${{ github.ref_name }}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Name $ARCHIVE
          Copy-Item -Recurse "_build\prod\rel\scry_2\*" "$ARCHIVE\"
          "Run install.bat to set up Scry2.`nSee https://github.com/${{ github.repository }} for full instructions." | Out-File "$ARCHIVE\README.txt" -Encoding UTF8
          Compress-Archive -Path "$ARCHIVE" -DestinationPath "${ARCHIVE}.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: scry_2-${{ github.ref_name }}-${{ matrix.platform }}.${{ matrix.ext }}
          generate_release_notes: true
