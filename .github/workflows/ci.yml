name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test

    # Postgres for the SERVER-tier tests (client/server split, ADR-042 Phase 2).
    # The default `mix test` step does NOT use it (server tests are excluded and
    # Scry2.ServerRepo is not started); the dedicated server step below does.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scry2
          POSTGRES_PASSWORD: scry2
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U scry2"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'

      # Required by the Scry2.Collection Rustler NIF (ADR 034).
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/native
          key: ubuntu-latest-mix-${{ env.MIX_ENV }}-1.19-28-nif1-${{ hashFiles('**/mix.lock') }}
          restore-keys: ubuntu-latest-mix-${{ env.MIX_ENV }}-1.19-28-nif1-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/scry2_collection_reader/target
          key: ubuntu-latest-cargo-${{ hashFiles('native/scry2_collection_reader/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y inotify-tools

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Run server-tier tests (Postgres)
        env:
          SCRY2_SERVER_TESTS: "1"
        run: mix test.server
